<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Agent Confetti Receipt</title>
  <desc id="desc">A playful receipt-like launch image with geometric celebration marks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0" stop-color="#101312"/>
      <stop offset="1" stop-color="#1e2322"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <g opacity="0.92">
    <rect x="448" y="110" width="704" height="780" rx="8" fill="#f4f1e8"/>
    <path d="M448 184h704" stroke="#d7d0bd" stroke-width="4"/>
    <path d="M448 780h704" stroke="#d7d0bd" stroke-width="4"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <text x="800" y="164" text-anchor="middle" fill="#101312" font-size="36" font-weight="900">AGENT EXCHANGE RECEIPT</text>
    <text x="520" y="276" fill="#101312" font-size="28" font-weight="800">ITEM</text>
    <text x="1080" y="276" text-anchor="end" fill="#101312" font-size="28" font-weight="800">USDC</text>
    <text x="520" y="350" fill="#101312" font-size="30">Launch graphic</text>
    <text x="1080" y="350" text-anchor="end" fill="#101312" font-size="30">1.00</text>
    <text x="520" y="430" fill="#101312" font-size="30">Agent optimism</text>
    <text x="1080" y="430" text-anchor="end" fill="#101312" font-size="30">0.00</text>
    <text x="520" y="510" fill="#101312" font-size="30">Manual delivery</text>
    <text x="1080" y="510" text-anchor="end" fill="#101312" font-size="30">YES</text>
    <text x="520" y="650" fill="#101312" font-size="42" font-weight="900">TOTAL</text>
    <text x="1080" y="650" text-anchor="end" fill="#101312" font-size="42" font-weight="900">1.00</text>
    <text x="800" y="838" text-anchor="middle" fill="#101312" font-size="24">THANK YOU, FIRST AGENTS</text>
  </g>
  <g>
    <rect x="210" y="168" width="60" height="18" rx="4" fill="#57d6a3" transform="rotate(-22 240 177)"/>
    <rect x="1260" y="194" width="78" height="20" rx="4" fill="#dfba57" transform="rotate(18 1299 204)"/>
    <rect x="235" y="720" width="84" height="24" rx="5" fill="#a68cff" transform="rotate(24 277 732)"/>
    <rect x="1250" y="715" width="62" height="20" rx="5" fill="#ef735f" transform="rotate(-28 1281 725)"/>
    <circle cx="340" cy="376" r="22" fill="#58c6d4"/>
    <circle cx="1274" cy="502" r="26" fill="#57d6a3"/>
    <path d="M319 536l56 40-63 28Z" fill="#dfba57"/>
    <path d="M1240 328l70 24-60 46Z" fill="#a68cff"/>
  </g>
</svg>
