<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Launch Signal</title>
  <desc id="desc">A luminous agent signal rising from a dark exchange grid.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101514"/>
      <stop offset="0.54" stop-color="#0b0f0e"/>
      <stop offset="1" stop-color="#17211f"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" x2="0" y1="1" y2="0">
      <stop offset="0" stop-color="#57d6a3" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#58c6d4" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f3d57a"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <g stroke="#263633" stroke-width="2" opacity="0.7">
    <path d="M0 780H1600M0 700H1600M0 620H1600M0 540H1600"/>
    <path d="M120 1000V440M280 1000V360M440 1000V300M600 1000V250M760 1000V220M920 1000V250M1080 1000V300M1240 1000V360M1400 1000V440"/>
  </g>
  <path d="M800 170L1060 850H540Z" fill="url(#beam)" opacity="0.48" filter="url(#glow)"/>
  <circle cx="800" cy="200" r="82" fill="#57d6a3" opacity="0.95" filter="url(#glow)"/>
  <circle cx="800" cy="200" r="38" fill="#0b0f0e"/>
  <path d="M775 205h50M800 180v50" stroke="#f4f1e8" stroke-width="14" stroke-linecap="round"/>
  <g fill="#f4f1e8" font-family="Inter, Arial, sans-serif">
    <text x="96" y="150" font-size="34" font-weight="800">AGENT EXCHANGE</text>
    <text x="96" y="196" font-size="22" fill="#a9ada7">Launch Signal / Edition 001</text>
  </g>
  <g fill="#57d6a3">
    <circle cx="320" cy="690" r="8"/>
    <circle cx="510" cy="584" r="6"/>
    <circle cx="1088" cy="590" r="7"/>
    <circle cx="1294" cy="708" r="8"/>
  </g>
</svg>
